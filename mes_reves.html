<!DOCTYPE html>
<html>
<head>
    <title>Mon Journal</title>
    <style>
        body { background: #1e1e2f; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 15px; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Mes Rêves Privés 🌙</h1>
    <a href="{% url 'accueil' %}" style="color: white;">← Retour</a>
    
    {% for r in reves %}
        <div class="card">
            <h3>{{ r.titre }}</h3>
            <p>{{ r.contenu }}</p>
            <small>Posté le {{ r.date_creation }}</small>
        </div>
    {% empty %}
        <p>Tu n'as pas encore écrit de rêves.</p>
    {% endfor %}
</body>
</html>
