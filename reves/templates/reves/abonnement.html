<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NUREVE - Premium</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #1e1e2f 0%, #4b4b7a 100%); 
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        p { font-size: 1.1em; margin-bottom: 30px; opacity: 0.9; line-height: 1.5; }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn-whatsapp { background-color: #25D366; color: white; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-secondary { border: 2px solid white; color: white; font-size: 0.9em; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .phone-number { display: block; margin-top: 15px; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Devenir Premium 🌙</h1>
        <p>Soutiens NUREVE pour 3$ et débloque ton journal illimité.<br>Contacte-nous pour activer ton compte :</p>
        
        <!-- Lien direct vers WhatsApp -->
        <a href="https://wa.me" class="btn btn-whatsapp">
            Envoyer un message WhatsApp
        </a>

        <span class="phone-number">Ou par appel : +243 975 646 462</span>
        
        <br>
        <a href="{% url 'accueil' %}" class="btn btn-secondary">Retour à l'accueil</a>
    </div>
</body>
</html>
