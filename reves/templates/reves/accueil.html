<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUREVE</title>
    <!-- CSS ultra léger -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        /* Empêche tout mouvement bizarre sur mobile */
        html, body { 
            overflow-x: hidden; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: #111827; 
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
        }

        /* Cadre fixe et centré */
        .app-container {
            width: 100%;
            max-width: 450px; /* Taille idéale pour mobile et centré sur PC */
            padding: 25px;
            text-align: center;
        }

        h1 { font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 5px; }
        .tagline { color: #9ca3af; font-size: 1rem; margin-bottom: 35px; }

        /* Boutons larges et tactiles */
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-nav {
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            font-size: 1rem;
        }

        .btn-main { background: #6366f1; color: white; }
        .btn-sec { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-prem { background: #f59e0b; color: #451a03; }

        .btn-nav:active { transform: scale(0.98); }

        .premium-zone {
            margin-top: 40px;
            padding: 20px;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .user-info { color: #818cf8; margin-bottom: 20px; font-weight: 500; }
        .logout-btn { background: none; border: none; color: #ef4444; font-size: 0.85rem; margin-top: 15px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>NUREVE 🌙</h1>
        <p class="tagline">Gardez trace de vos nuits</p>

        <div class="btn-box">
            {% if user.is_authenticated %}
                <div class="user-info">Bonjour, {{ user.username }} ✨</div>
                
                <a href="{% url 'nouveau_reve' %}" class="btn-nav btn-main">✍️ Écrire un rêve</a>
                <a href="{% url 'mes_reves' %}" class="btn-nav btn-sec">📖 Mon Journal</a>
                <a href="{% url 'espace_public' %}" class="btn-nav btn-sec">🌍 Espace Public</a>
                
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Se déconnecter</button>
                </form>

            {% else %}
                <a href="{% url 'login' %}" class="btn-nav btn-main">Connexion</a>
                <a href="{% url 'signup' %}" class="btn-nav btn-sec">S'inscrire</a>
                <a href="{% url 'espace_public' %}" class="btn-nav btn-sec">Espace Public</a>
            {% endif %}
        </div>

        <div class="premium-zone">
            <a href="{% url 'abonnement' %}" class="btn-nav btn-prem">⭐ Mode Premium (3$)</a>
            <p style="font-size: 0.8rem; margin-top: 10px; color: #9ca3af; margin-bottom: 0;">
                Stockage illimité et badges exclusifs.
            </p>
        </div>
    </div>

</body>
</html>
