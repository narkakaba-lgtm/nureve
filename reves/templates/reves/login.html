<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NUREVE - Connexion</title>
    <style>
        /* On reprend le même style que signup.html */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #1e1e2f 0%, #4b4b7a 100%); color: white; }
        .container { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); width: 100%; max-width: 400px; text-align: center; }
        label { display: block; text-align: left; color: white; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn-submit { background-color: #6c5ce7; color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .footer-link { margin-top: 20px; display: block; color: #ddd; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connexion 🌙</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Se connecter</button>
        </form>
        <a href="{% url 'signup' %}" class="footer-link">Pas encore de compte ? S'inscrire</a>
    </div>
</body>
</html>
