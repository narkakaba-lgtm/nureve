<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUREVE - Écrire un rêve</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        /* Design unifié avec le reste de l'app */
        html, body { 
            margin: 0; 
            background: #111827; 
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        .write-container {
            width: 100%;
            max-width: 500px;
            padding: 25px;
        }

        h1 { font-weight: 800; font-size: 1.8rem; margin-bottom: 8px; letter-spacing: -1px; text-align: center; }
        .subtitle { color: #9ca3af; font-size: 0.95rem; margin-bottom: 35px; text-align: center; }

        /* Formulaire stylisé */
        form p { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 0.85rem; 
            color: #818cf8; 
            margin-bottom: 8px; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Inputs et Textarea (zone de texte) */
        input, textarea, select { 
            width: 100%; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); 
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        textarea { 
            min-height: 180px; 
            line-height: 1.6;
        }

        input:focus, textarea:focus { 
            outline: none; 
            border-color: #6366f1; 
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        /* Bouton d'enregistrement */
        .btn-save {
            background: #6366f1;
            color: white;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            border: none;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: 0.2s;
        }
        
        .btn-save:active { transform: scale(0.97); }

        .back-link { 
            margin-top: 30px; 
            display: block; 
            color: #6b7280; 
            text-decoration: none; 
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="write-container">
        <h1>Raconte ton rêve... 🌙</h1>
        <p class="subtitle">Chaque détail compte avant qu'il ne s'évapore.</p>
        
        <form method="POST">
            {% csrf_token %}
            
            {# Django insère le titre et le grand champ texte ici #}
            {{ form.as_p }}
            
            <button type="submit" class="btn-save">Enregistrer dans mon journal</button>
        </form>

        <a href="{% url 'accueil' %}" class="back-link">
            ← Annuler et revenir
        </a>
    </div>

    <script>
        // Améliore les champs générés par Django automatiquement
        window.onload = function() {
            var textareas = document.getElementsByTagName('textarea');
            for(var i=0; i<textareas.length; i++) {
                textareas[i].placeholder = "Décris ton aventure ici...";
            }
        };
    </script>
</body>
</html>
