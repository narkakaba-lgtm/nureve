<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscription - NUREVE</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        /* Cohérence totale avec l'accueil et la connexion */
        html, body { 
            margin: 0; 
            background: #111827; 
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        .signup-container {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
        }

        h1 { font-weight: 800; font-size: 1.8rem; margin-bottom: 10px; letter-spacing: -1px; }
        .subtitle { color: #9ca3af; font-size: 0.95rem; margin-bottom: 30px; }

        /* Style du formulaire Django */
        form p { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: #818cf8; margin-bottom: 6px; font-weight: 600; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); 
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #6366f1; background: rgba(255,255,255,0.08); }

        /* Textes d'aide Django (ex: règles du mot de passe) */
        .helptext { 
            display: block; 
            font-size: 0.75rem; 
            color: #6b7280; 
            margin-top: 5px; 
            line-height: 1.3;
        }

        /* Liste des erreurs */
        .errorlist {
            list-style: none;
            padding: 0;
            color: #f87171;
            font-size: 0.8rem;
            text-align: left;
            margin-top: 5px;
        }

        .btn-submit {
            background: #6366f1;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            border: none;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-submit:active { transform: scale(0.98); }

        .footer-link { 
            margin-top: 25px; 
            display: block; 
            color: #9ca3af; 
            text-decoration: none; 
            font-size: 0.9rem;
        }
        .footer-link strong { color: #818cf8; }
    </style>
</head>
<body>

    <div class="signup-container">
        <h1>Rejoindre NUREVE 🌙</h1>
        <p class="subtitle">Commencez à archiver vos nuits dès maintenant.</p>
        
        <form method="post">
            {% csrf_token %}
            
            {# Django insère les champs et erreurs ici #}
            {{ form.as_p }}
            
            <button type="submit" class="btn-submit">Créer mon compte</button>
        </form>

        <a href="{% url 'login' %}" class="footer-link">
            Déjà inscrit ? <strong>Se connecter</strong>
        </a>
        <a href="{% url 'accueil' %}" class="footer-link" style="margin-top: 10px; font-size: 0.8rem;">
            ← Retour à l'accueil
        </a>
    </div>

</body>
</html>
